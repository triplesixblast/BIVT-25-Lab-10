name: .NET Tests & Auto-commit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  check-target:
    runs-on: ubuntu-latest
    outputs:
      pr_valid: ${{ steps.check.outputs.pr_valid }}
    steps:
      - name: 🚫 Проверка PR в main
        id: check
        shell: bash
        run: |
          PR_BASE="${{ github.event.pull_request.base.ref }}"
          echo "Base branch: $PR_BASE"
          if [ "$PR_BASE" = "main" ]; then
            echo "❌ Нельзя отправлять работу в main ветку."
            echo "pr_valid=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ PR направлен в '$PR_BASE', можно запускать тесты."
            echo "pr_valid=true" >> $GITHUB_OUTPUT
          fi

  tests:
    name: Run test
    runs-on: windows-latest
    needs: check-target
    if: |
      (github.event_name == 'pull_request' && needs.check-target.outputs.pr_valid == 'true') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        configuration: [Debug]

    steps:
      - name: Checkout code safely
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore Lab9/Lab9.sln

      - name: Build
        run: dotnet build Lab9/Lab9.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Run tests (league cascade)
        id: cascade
        shell: pwsh
        env:
          CFG: ${{ matrix.configuration }}
        run: |
          $proj = "Lab9test/Lab9test.csproj"
          Write-Host "Building test project..."
          dotnet build $proj -c $Env:CFG

          $dll = Join-Path $PWD "Lab9test\bin\$Env:CFG\net8.0\Lab9test.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "DLL не найдена: $dll"
            exit 1
          }

          $leagues = @{
            "Purple" = @("GeneralTest","TxtTest","JsonTest","XmlTest","PurpleManagerTest")
            "Blue"   = @("GeneralTest","TxtTest","JsonTest","BlueManagerTest")
            "Green"  = @("GeneralTest","TxtTest","JsonTest","GreenManagerTest")
            "White"  = @("GeneralTest","TxtTest","JsonTest","WhiteManagerTest")
          }

          foreach ($leagueName in $leagues.Keys) {
            Write-Host "Лига: $leagueName"
            $allPassed = $true

            foreach ($cls in $leagues[$leagueName]) {
              $filter = "FullyQualifiedName~$leagueName.$cls"
              Write-Host "Запуск тестов класса: $leagueName.$cls"
              dotnet vstest $dll --TestCaseFilter:"$filter" --Logger:"trx;LogFileName=test-$leagueName-$cls.trx"

              if ($LASTEXITCODE -ne 0) {
                Write-Host "❌ Тест $leagueName.$cls не прошёл."
                $allPassed = $false
              } else {
                Write-Host "✅ Тест $leagueName.$cls прошёл."
              }
            }

            if ($allPassed) {
              Write-Host "✅ Все тесты лиги $leagueName прошли! Останавливаем каскад."
              exit 0
            } else {
              Write-Host "⚠️ Не все тесты лиги $leagueName прошли. Переходим к следующей лиге."
            }
          }

          Write-Host "❌ Ни одна лига полностью не прошла. Проверьте корректность загруженных файлов."
          exit 1

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-${{ matrix.configuration }}
          path: "**/test-*.trx"
